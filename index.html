<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Viewer</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --border: #262b36;
    --text: #e6e8eb;
    --muted: #8b95a7;
    --accent: #7cf1c2;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--accent); }
  p.sub { margin: 0 0 20px; color: var(--muted); font-size: 13px; }

  form { display: flex; gap: 10px; flex-wrap: wrap; }
  input[type="url"] {
    flex: 1;
    min-width: 240px;
    background: #0b0d12;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  input[type="url"]:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #0b0d12;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  label.row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
  }
  select {
    background: #0b0d12;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
  }
  .status {
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--accent); }
</style>

<body>
  <div class="card">
    <h1>HTML <span>Viewer</span></h1>
    <p class="sub">Enter a URL — the fetched HTML will render in this same tab.</p>

    <form id="form">
      <input type="url" id="url" placeholder="https://example.com" required="" autofocus="">
      <button type="submit" id="go">Load</button>
    </form>

    <label class="row">
      Proxy:
      <select id="proxy">
        <option value="server" selected="">Built-in (server)</option>
        <option value="allorigins">AllOrigins</option>
        <option value="corsproxy">corsproxy.io</option>
        <option value="codetabs">codetabs</option>
        <option value="direct">No proxy (direct)</option>
      </select>
      <span style="margin-left:auto">Tip: switch proxy if a site blocks one.</span>
    </label>

    <div class="status" id="status">Ready.</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const form = $('form'), urlInput = $('url'), proxySel = $('proxy');
  const statusEl = $('status'), goBtn = $('go');

  function setStatus(msg, kind='') {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + kind;
  }

  function buildProxyUrl(target, provider) {
    const enc = encodeURIComponent(target);
    switch (provider) {
      case 'server':     return `/api/proxy?url=${enc}`;
      case 'allorigins': return `https://api.allorigins.win/raw?url=${enc}`;
      case 'corsproxy':  return `https://corsproxy.io/?${enc}`;
      case 'codetabs':   return `https://api.codetabs.com/v1/proxy/?quest=${target}`;
      case 'direct':
      default:           return target;
    }
  }

  async function fetchHtml(targetUrl, provider) {
    const proxied = buildProxyUrl(targetUrl, provider);
    const res = await fetch(proxied);
    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
    return await res.text();
  }

  // Inject a <base> tag so relative links/images/css resolve against the original site
  function injectBase(html, baseHref) {
    const baseTag = `<base href="${baseHref}">`;
    if (/<head[^>]*>/i.test(html)) {
      return html.replace(/<head[^>]*>/i, (m) => m + baseTag);
    }
    if (/<html[^>]*>/i.test(html)) {
      return html.replace(/<html[^>]*>/i, (m) => m + `<head>${baseTag}</head>`);
    }
    return `<head>${baseTag}</head>` + html;
  }

  function renderInSameTab(html, sourceUrl) {
    let baseHref = sourceUrl;
    try {
      const u = new URL(sourceUrl);
      baseHref = u.origin + u.pathname.replace(/[^/]*$/, '');
    } catch {}
    const finalHtml = injectBase(html, baseHref);
    // Replace the entire document with the fetched HTML, in the same tab.
    document.open();
    document.write(finalHtml);
    document.close();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let target = urlInput.value.trim();
    if (!target) return;
    if (!/^https?:\/\//i.test(target)) target = 'https://' + target;

    goBtn.disabled = true;
    setStatus(`Fetching ${target}…`);

    const providers = [proxySel.value];
    for (const p of ['server','allorigins','corsproxy','codetabs']) {
      if (!providers.includes(p)) providers.push(p);
    }

    let lastErr = null;
    for (const p of providers) {
      try {
        setStatus(`Trying proxy: ${p}…`);
        const html = await fetchHtml(target, p);
        setStatus(`Loaded via ${p}. Rendering…`, 'ok');
        renderInSameTab(html, target);
        return;
      } catch (err) {
        lastErr = err;
        console.warn(`Proxy ${p} failed:`, err);
      }
    }

    setStatus(`Failed to fetch. Last error: ${lastErr?.message || lastErr}`, 'error');
    goBtn.disabled = false;
  });
</script>
